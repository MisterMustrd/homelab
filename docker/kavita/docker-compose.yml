services:
  kavita:
    image: lscr.io/linuxserver/kavita:latest
    container_name: kavita

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/[Timezone]

    volumes:
      - ./config:/config
      - /mnt/storage/Books/Library:/books
      - /mnt/storage/Books/Comics:/comics
      - /mnt/storage/Downloads/Suwayomi:/suwayomi

    ports:
      - "[TailscaleIP]:5000:5000"

    restart: unless-stopped

    labels:
      - "com.centurylinklabs.watchtower.enable=true"

    networks:
      - vpn_net

networks:
  vpn_net:
    external: true